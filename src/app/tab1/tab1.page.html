<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Sobre Mim
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Sobre Mim</ion-title>
    </ion-toolbar>
  </ion-header>

  <div>
    <ion-card>
      <img [src]="fotografia" alt="Fotografia do autor" />

      <ion-card-header>
        <ion-card-title>{{ nome }}</ion-card-title>
        <ion-card-subtitle>Apresentação do autor</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-list>
          <ion-item>
            <ion-label>
              <h2>Nome</h2>
              <p>{{ nome }}</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Data de nascimento</h2>
              <p>{{ dataNascimento }}</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Naturalidade</h2>
              <p>{{ naturalidade }}</p>
            </ion-label>
          </ion-item>
        </ion-list>

        <div>
          <h2>Breve biografia</h2>
          <p>{{ biografia }}</p>
          <p>{{ experiencia }}</p>
          <p>{{ interesses }}</p>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
